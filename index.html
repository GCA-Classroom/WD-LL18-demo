<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Poster Mashup App</title>
    <!-- Use a more elegant Google Font: 'Merriweather' -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
<body>
  <h1>Movie Poster Mashup</h1>
  <!-- Input fields for movie titles -->
  <div class="input-group">
    <input type="text" id="movie1" placeholder="Enter first movie title">
    <input type="text" id="movie2" placeholder="Enter second movie title">
    <button id="generateBtn">Generate Poster</button>
  </div>
  <!-- Container for the generated image -->
  <div id="img-container"></div>
  <script src="secrets.js"></script>
  <script src="script.js"></script>
</body>
</html>
